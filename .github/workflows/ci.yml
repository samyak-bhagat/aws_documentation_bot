name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  type-check:
    name: Type Check (MyPy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mypy + stubs
        run: pip install mypy pydantic pydantic-settings langchain-aws langgraph fastapi

      - name: Run mypy
        run: mypy services/ agents/ apps/ core/ --ignore-missing-imports

  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: type-check
    env:
      APP_ENV: development
      MCP_SERVER_COMMAND: uvx
      MCP_SERVER_ARGS: awslabs.aws-documentation-mcp-server@latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=. --cov-report=term-missing

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infra/docker/Dockerfile.api -t aws-docs-api:ci .
